{% extends "base.html" %}

{% block title %}Nueva Contraseña - Check-In Tolima{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh; padding: 40px 20px;">
    <div style="background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #E5E7EB;">
        <h1 style="font-size: 24px; margin-bottom: 8px; color: #111827;">Nueva Contraseña</h1>
        <p style="color: #6B7280; font-size: 15px; margin-bottom: 32px;">Crea una contraseña segura para tu cuenta.</p>
        
        <form action="{{ url_for('auth.restablecer_password', token=token) }}" method="POST">
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px;">Nueva Contraseña</label>
                <input type="password" name="password" style="width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; box-sizing: border-box;" placeholder="Mínimo 8 caracteres" required minlength="8">
            </div>

            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px;">Confirmar Contraseña</label>
                <input type="password" name="password_confirm" style="width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; box-sizing: border-box;" placeholder="Repite tu contraseña" required minlength="8">
            </div>
            
            <button type="submit" class="btn" style="width: 100%; background: var(--verde-tolima); color: #fff; padding: 14px; font-weight: 700;">Actualizar Contraseña</button>
        </form>
    </div>
</div>
{% endblock %}
