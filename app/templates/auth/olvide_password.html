{% extends "base.html" %}

{% block title %}Recuperar Contraseña - Check-In Tolima{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh; padding: 40px 20px;">
    <div style="background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #E5E7EB;">
        <h1 style="font-size: 24px; margin-bottom: 8px; color: #111827;">¿Olvidaste tu contraseña?</h1>
        <p style="color: #6B7280; font-size: 15px; margin-bottom: 32px;">Ingresa tu correo y te enviaremos un enlace para que crees una nueva.</p>
        
        <form action="{{ url_for('auth.olvide_password') }}" method="POST">
            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px;">Correo Electrónico</label>
                <input type="email" name="correo" style="width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; box-sizing: border-box;" placeholder="tu@correo.com" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; background: var(--verde-tolima); color: #fff; padding: 14px; font-weight: 700;">Enviar Enlace</button>
        </form>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="{{ url_for('auth.login') }}" style="color: var(--verde-tolima); text-decoration: none; font-size: 14px; font-weight: 600;">Volver al inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
